<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🐍 Snake Game</title>
    <link rel="icon" href="/favicon.ico" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ── Reset ────────────────────────────────────────────── */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        user-select: none;
      }

      /* ── Page ─────────────────────────────────────────────── */
      body {
        background-color: #0f0f1a;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Inter", "Segoe UI", Arial, sans-serif;
      }

      /* ── Game Wrapper ─────────────────────────────────────── */
      #game-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        box-shadow: 0 0 40px rgba(0, 255, 136, 0.15);
        border-radius: 4px;
        overflow: hidden;
        position: relative;
      }

      /* ── HUD Bar ──────────────────────────────────────────── */
      #hud-bar {
        width: 100%;
        background-color: #12122a;
        border-bottom: 1px solid #1e1e3a;
        display: flex;
        align-items: center;
        justify-content: space-around;
        padding: 10px 16px;
        gap: 8px;
      }

      /* ── HUD Item ─────────────────────────────────────────── */
      .hud-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;
        min-width: 80px;
      }

      .hud-label {
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #555577;
      }

      .hud-value {
        font-size: 20px;
        font-weight: 700;
        color: #00ff88;
        line-height: 1;
        font-variant-numeric: tabular-nums;
      }

      /* ── Divider between HUD items ────────────────────────── */
      .hud-divider {
        width: 1px;
        height: 32px;
        background-color: #1e1e3a;
      }

      /* ── Canvas ───────────────────────────────────────────── */
      #gameCanvas {
        display: block;
      }

      /* ── Screen Overlays (shared) ─────────────────────────── */
      .screen-overlay {
        position: absolute;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(15, 15, 26, 0.92);
        opacity: 0;
        transition: opacity 0.25s ease;
        z-index: 10;
        border-radius: 4px;
      }

      .screen-overlay.visible {
        opacity: 1;
      }

      .screen-box {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        padding: 40px 48px;
        text-align: center;
      }

      .screen-title {
        font-size: 36px;
        font-weight: 700;
        color: #00ff88;
        letter-spacing: 0.04em;
      }

      .screen-subtitle {
        font-size: 14px;
        color: #888aaa;
        letter-spacing: 0.06em;
      }

      .screen-hint {
        font-size: 12px;
        color: #555577;
        letter-spacing: 0.05em;
        margin-top: 4px;
      }

      /* ── Stage Cards ──────────────────────────────────────── */
      .stage-cards {
        display: flex;
        gap: 16px;
        margin: 8px 0;
      }

      .stage-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        padding: 20px 24px;
        background: #12122a;
        border: 1px solid #1e1e3a;
        border-radius: 10px;
        cursor: pointer;
        transition:
          border-color 0.2s,
          background 0.2s,
          transform 0.15s;
        min-width: 130px;
        color: #ffffff;
        font-family: inherit;
      }

      .stage-card:hover {
        border-color: #00ff88;
        background: #1a1a3a;
        transform: translateY(-2px);
      }

      .stage-number {
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: #00ff88;
      }

      .stage-name {
        font-size: 18px;
        font-weight: 700;
        color: #ffffff;
      }

      .stage-desc {
        font-size: 11px;
        color: #666888;
        line-height: 1.5;
        margin-top: 4px;
      }

      /* ── Game Over Stats ──────────────────────────────────── */
      .gameover-stats {
        display: flex;
        flex-direction: column;
        gap: 10px;
        width: 100%;
        background: #12122a;
        border: 1px solid #1e1e3a;
        border-radius: 10px;
        padding: 16px 24px;
      }

      .stat-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .stat-label {
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #555577;
      }

      .stat-value {
        font-size: 18px;
        font-weight: 700;
        color: #ffffff;
        font-variant-numeric: tabular-nums;
      }

      .stat-value.accent {
        color: #00ff88;
      }

      /* ── Buttons ──────────────────────────────────────────── */
      .screen-actions {
        display: flex;
        flex-direction: column;
        gap: 10px;
        width: 100%;
      }

      .btn-primary,
      .btn-secondary {
        width: 100%;
        padding: 12px 24px;
        border: none;
        border-radius: 8px;
        font-family: inherit;
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.05em;
        cursor: pointer;
        transition:
          opacity 0.2s,
          transform 0.15s;
      }

      .btn-primary {
        background: #00ff88;
        color: #0f0f1a;
      }

      .btn-secondary {
        background: transparent;
        color: #888aaa;
        border: 1px solid #1e1e3a;
      }

      .btn-primary:hover,
      .btn-secondary:hover {
        opacity: 0.85;
        transform: translateY(-1px);
      }

      kbd {
        background: #1e1e3a;
        border: 1px solid #333355;
        border-radius: 4px;
        padding: 1px 6px;
        font-size: 11px;
        color: #aaaacc;
        font-family: inherit;
      }
      /* ── Quit Button ──────────────────────────────────────── */
      .btn-quit {
        background: transparent;
        border: none;
        color: #333355;
        font-family: inherit;
        font-size: 12px;
        cursor: pointer;
        margin-top: 8px;
        padding: 4px 8px;
        transition: color 0.2s;
        letter-spacing: 0.05em;
      }

      .btn-quit:hover {
        color: #ff4444;
      }
    </style>
  </head>
  <body>
    <div id="game-wrapper">
      <!-- HUD Bar -->
      <div id="hud-bar">
        <div class="hud-item">
          <span class="hud-label">Score</span>
          <span class="hud-value" id="hud-score">0</span>
        </div>
        <div class="hud-divider"></div>
        <div class="hud-item">
          <span class="hud-label">Best</span>
          <span class="hud-value" id="hud-best">0</span>
        </div>
        <div class="hud-divider"></div>
        <div class="hud-item">
          <span class="hud-label">Length</span>
          <span class="hud-value" id="hud-length">3</span>
        </div>
        <div class="hud-divider"></div>
        <div class="hud-item">
          <span class="hud-label">Time</span>
          <span class="hud-value" id="hud-time">00:00</span>
        </div>
      </div>

      <!-- Game Canvas -->
      <canvas id="gameCanvas"></canvas>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
